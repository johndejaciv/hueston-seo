<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hueston SEO Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f1623;color:#fff;font-family:'Inter',system-ui,sans-serif;min-height:100vh}
  input::placeholder{color:#4a5f78}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect } = React;

const B = { navy:"#0f1623", navyMid:"#1a2332", navyLight:"#22304a", red:"#e8291c", gray:"#8b99ad" };
const card = { background:"#1a2332", border:"1px solid #22304a", borderRadius:10, overflow:"hidden" };
const sc = s => s >= 70 ? "#22c55e" : s >= 40 ? "#f59e0b" : "#e8291c";

const POOL = [
  { id:"missing_title",     label:"Missing or empty title tag",           priority:"critical", category:"On-Page",         fix:"Add a unique descriptive title tag (50-60 chars) with the primary keyword near the front." },
  { id:"dup_title",         label:"Duplicate title tags",                 priority:"critical", category:"On-Page",         fix:"Each page needs a unique title. Audit CMS templates so dynamic titles are generated per-page." },
  { id:"missing_h1",        label:"Missing H1 tag",                       priority:"critical", category:"On-Page",         fix:"Add exactly one H1 per page that clearly describes the topic with the primary keyword." },
  { id:"dup_h1",            label:"Multiple H1 tags on same page",        priority:"medium",   category:"On-Page",         fix:"Reduce to a single H1. Move additional headings to H2 or H3." },
  { id:"missing_meta",      label:"Missing meta descriptions",            priority:"medium",   category:"On-Page",         fix:"Write unique meta descriptions (150-160 chars) for each page." },
  { id:"broken_links",      label:"Broken internal links (4xx)",          priority:"critical", category:"Technical",       fix:"Redirect all broken URLs to the most relevant live page using 301 redirects." },
  { id:"redirect_chains",   label:"Redirect chains (3xx)",                priority:"medium",   category:"Technical",       fix:"Reduce chains to a single 301. Update source links to point to the final URL." },
  { id:"missing_canonical", label:"Missing canonical tags",               priority:"medium",   category:"Technical",       fix:"Add a canonical tag to each page pointing to the preferred URL." },
  { id:"noindex",           label:"Important pages blocked by noindex",   priority:"critical", category:"Indexability",    fix:"Review noindex tags — ensure pages meant to rank do not have this set." },
  { id:"missing_sitemap",   label:"Missing XML sitemap",                  priority:"critical", category:"Technical",       fix:"Create an XML sitemap and submit it via Google Search Console." },
  { id:"missing_alt",       label:"Images missing alt text",              priority:"medium",   category:"Accessibility",   fix:"Add descriptive alt text to all images." },
  { id:"slow_pages",        label:"Slow loading pages (over 3s)",         priority:"critical", category:"Performance",     fix:"Compress images, enable caching, use a CDN, and minimize render-blocking JS/CSS." },
  { id:"large_images",      label:"Oversized images (over 500KB)",        priority:"medium",   category:"Performance",     fix:"Compress images to under 200KB. Use WebP format." },
  { id:"no_schema",         label:"Missing structured data / schema",     priority:"medium",   category:"Structured Data", fix:"Implement JSON-LD schema (Organization, LocalBusiness, FAQ)." },
  { id:"thin_content",      label:"Thin content pages (under 300 words)", priority:"medium",   category:"Content",         fix:"Expand thin pages with helpful content that addresses user intent." },
  { id:"missing_og",        label:"Missing Open Graph tags",              priority:"medium",   category:"On-Page",         fix:"Add og:title, og:description, and og:image tags." },
];

const PATHS = ["/","/about","/services","/blog","/contact","/pricing","/faq","/team","/work","/resources"];
function rand(seed,n){return Math.abs(Math.sin(seed*9301+n*49297)*233280)%1}

function demoScan(url) {
  const seed = url.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  const issues = [];
  POOL.forEach((check,i) => {
    if (rand(seed,i) > (check.priority==="critical"?0.55:0.45)) return;
    const count = Math.max(1,Math.floor(rand(seed+i,i+1)*8));
    const affected = Array.from({length:count},(_,k)=>url.replace(/\/$/,"")+PATHS[k%PATHS.length]);
    issues.push({...check,count,affected});
  });
  const passed = POOL.filter(c=>!issues.find(i=>i.id===c.id)).map(c=>c.label);
  const crit = issues.filter(i=>i.priority==="critical").length;
  const score = Math.max(10,Math.min(95,100-crit*12-(issues.length-crit)*4));
  const summary = crit>3?"This site has several critical SEO issues suppressing rankings. Immediate attention needed.":crit>0?"The site has some critical issues to resolve soon.":"The site is in good SEO health. Focus on medium-priority items.";
  return {url,score,summary,issues,passed,date:new Date().toISOString(),live:false};
}

function auditPrompt(url){
  return `You are an expert technical SEO auditor. Your job is to audit the website at: ${url}

Use the web_search tool to:
1. Fetch the homepage HTML directly by searching: site:${url}
2. Check for sitemap at ${url}/sitemap.xml
3. Check for robots.txt at ${url}/robots.txt
4. Search for any known SEO issues: "${url} site:search.google.com" or related queries
5. Look up the site's Google PageSpeed or Core Web Vitals data if available

Based on everything you find, produce a real technical SEO audit. Do NOT say you cannot audit the site — always return your best assessment based on available signals.

You MUST respond with ONLY a valid JSON object, no explanation, no markdown fences:
{"url":"${url}","score":<integer 0-100>,"summary":"<2-3 sentence plain English summary>","issues":[{"id":"<snake_case_id>","label":"<issue name>","priority":"critical or medium","category":"On-Page or Technical or Indexability or Performance or Content or Structured Data or Accessibility","count":<number>,"affected":["<url or element>"],"fix":"<specific actionable fix>"}],"passed":["<name of check that passed>"]}

Be specific. Include real URLs where possible. Only include issues you have evidence for.`;
}

function notionPrompt(url,scan){
  const crit=scan.issues.filter(i=>i.priority==="critical");
  const med=scan.issues.filter(i=>i.priority==="medium");
  return "Create a Notion SEO task. Respond ONLY with valid JSON no markdown: {\"title\":\"<site + month/year SEO Audit>\",\"priority\":\"High|Medium|Low\",\"body\":\"<markdown with ## Critical Issues ## Medium Issues ## Next Steps using - [ ] checkboxes>\"}. Site="+url+" Score="+scan.score+"/100 Summary="+scan.summary+" Critical("+crit.length+")="+crit.map(i=>i.label+": "+i.fix).join("; ")+" Medium("+med.length+")="+med.map(i=>i.label+": "+i.fix).join("; ");
}

function extractDbId(input){
  const m=input.match(/([a-f0-9]{32}|[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})/i);
  return m?m[1]:input.trim();
}

function Spin(){return <span style={{width:13,height:13,border:"2px solid rgba(255,255,255,0.2)",borderTop:"2px solid #fff",borderRadius:"50%",display:"inline-block",animation:"spin .7s linear infinite",flexShrink:0}}/>}

function Logo(){return(
  <span style={{display:"flex",alignItems:"center"}}>
    <span style={{fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:22,color:"#fff",letterSpacing:"-0.3px"}}>hueston</span>
    <svg width="11" height="11" viewBox="0 0 11 11" style={{marginLeft:3,marginBottom:-1}}>
      <rect x="1.5" y="1.5" width="8" height="8" rx="1" fill="#e8291c" transform="rotate(45 5.5 5.5)"/>
    </svg>
  </span>
)}

function App(){
  const [sites,setSites]=useState([]);
  const [newSite,setNewSite]=useState("");
  const [scans,setScans]=useState({});
  const [scanning,setScanning]=useState({});
  const [logs,setLogs]=useState({});
  const [notionLinks,setNotionLinks]=useState({});
  const [pushing,setPushing]=useState({});
  const [pushed,setPushed]=useState({});
  const [pushErr,setPushErr]=useState({});
  const [view,setView]=useState("dashboard");
  const [active,setActive]=useState(null);
  const [tab,setTab]=useState("all");
  const [expanded,setExpanded]=useState(null);
  const [loading,setLoading]=useState(true);
  const [dbErr,setDbErr]=useState(null);

  useEffect(()=>{
    fetch("/api/sites")
      .then(r=>r.json())
      .then(data=>{
        if(data.error) setDbErr(data.error);
        if(data.sites) setSites(data.sites);
        if(data.scans) setScans(data.scans);
      })
      .catch(e=>setDbErr(e.message))
      .finally(()=>setLoading(false));
  },[]);

  const log=(url,msg)=>setLogs(s=>({...s,[url]:msg}));

  const addSite=async()=>{
    let v=newSite.trim().replace(/\/$/,"");
    if(!v)return;
    if(!v.startsWith("http"))v="https://"+v;
    if(sites.includes(v)){setNewSite("");return;}
    setNewSite("");
    const res=await fetch("/api/sites",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"add_site",url:v})});
    const data=await res.json();
    if(data.sites) setSites(data.sites);
    if(data.error) setDbErr(data.error);
  };

  const removeSite=async(url)=>{
    const res=await fetch("/api/sites",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"remove_site",url})});
    const data=await res.json();
    if(data.sites) setSites(data.sites);
    setScans(s=>{const n={...s};delete n[url];return n;});
    if(active===url){setActive(null);setView("dashboard");}
  };

  const runScan=useCallback(async(url)=>{
    setScanning(s=>({...s,[url]:true}));
    log(url,"Calling Claude API...");
    try{
      const res=await fetch("/api/scan",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:2000,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:auditPrompt(url)}],
        }),
      });
      log(url,"HTTP "+res.status);
      const raw=await res.text();
      if(!res.ok) throw new Error("HTTP "+res.status+": "+raw.slice(0,150));
      const data=JSON.parse(raw);
      if(data.error) throw new Error(JSON.stringify(data.error));
      const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const match=text.match(/\{[\s\S]*\}/);
      if(!match) throw new Error("No JSON in response — got: "+text.slice(0,200));
      const result={...JSON.parse(match[0]),date:new Date().toISOString(),live:true};
      setScans(s=>({...s,[url]:result}));
      log(url,"✓ Live scan complete");
      await fetch("/api/sites",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"save_scan",url,scan:result})});
    }catch(e){
      log(url,"Error: "+e.message+" — showing demo data");
      const demo=demoScan(url);
      setScans(s=>({...s,[url]:demo}));
      await fetch("/api/sites",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"save_scan",url,scan:demo})}).catch(()=>{});
    }
    setScanning(s=>({...s,[url]:false}));
  },[]);

  const doPush=async(url)=>{
    const scan=scans[url];
    const link=notionLinks[url];
    if(!scan)return;
    if(!link||!link.trim()){alert("Paste a Notion Database URL first.");return;}
    const dbId=extractDbId(link);
    setPushing(s=>({...s,[url]:true}));
    setPushErr(s=>({...s,[url]:null}));
    setPushed(s=>({...s,[url]:false}));
    try{
      const res=await fetch("/api/scan",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          mcp_servers:[{type:"url",url:"https://mcp.notion.com/mcp",name:"notion"}],
          messages:[{role:"user",content:"Create a new page in Notion database ID: "+dbId+". "+notionPrompt(url,scan)+" Use the create-pages tool now."}],
        }),
      });
      if(!res.ok) throw new Error("HTTP "+res.status);
      setPushed(s=>({...s,[url]:true}));
    }catch(e){
      setPushErr(s=>({...s,[url]:e.message}));
    }
    setPushing(s=>({...s,[url]:false}));
  };

  const scan=active?scans[active]:null;
  const issues=scan?(scan.issues||[]):[];
  const filtered=issues.filter(i=>tab==="all"||i.priority===tab);
  const cats=[...new Set(filtered.map(i=>i.category))];
  const getCrit=u=>(scans[u]?.issues||[]).filter(i=>i.priority==="critical").length;
  const getMed=u=>(scans[u]?.issues||[]).filter(i=>i.priority==="medium").length;
  const totalCrit=sites.reduce((a,u)=>a+getCrit(u),0);
  const totalMed=sites.reduce((a,u)=>a+getMed(u),0);

  if(loading)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16}}>
      <Spin/><div style={{color:B.gray,fontSize:14}}>Loading your sites...</div>
    </div>
  );

  return(
    <div style={{background:"#0f1623",minHeight:"100vh"}}>
      <div style={{background:"#1a2332",borderBottom:"1px solid #22304a",padding:"0 24px"}}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:60}}>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <Logo/>
            <span style={{color:B.gray,fontSize:13,borderLeft:"1px solid #22304a",paddingLeft:16}}>SEO Monitor</span>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            {view==="results"&&<button onClick={()=>setView("dashboard")} style={{background:"none",border:"none",color:B.gray,cursor:"pointer",fontSize:13}}>← Dashboard</button>}
            <button onClick={()=>sites.forEach(u=>runScan(u))} style={{background:"#e8291c",color:"#fff",border:"none",borderRadius:6,padding:"7px 16px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Scan All</button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:1100,margin:"0 auto",padding:"28px 24px"}}>

        {dbErr&&(
          <div style={{background:"rgba(232,41,28,.1)",border:"1px solid rgba(232,41,28,.3)",borderRadius:10,padding:"12px 18px",marginBottom:20,fontSize:13,color:"#e8291c"}}>
            ⚠ Database error: {dbErr} — check that your Blob store is connected to this project in Vercel.
          </div>
        )}

        {view==="dashboard"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:28}}>
              {[{label:"Sites Monitored",val:sites.length,color:"#fff"},{label:"Total Critical Issues",val:totalCrit,color:"#e8291c"},{label:"Total Medium Issues",val:totalMed,color:"#f59e0b"}].map(s=>(
                <div key={s.label} style={{...card,padding:"18px 20px"}}>
                  <div style={{color:B.gray,fontSize:11,fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.6px"}}>{s.label}</div>
                  <div style={{fontSize:32,fontWeight:700,color:s.color}}>{s.val}</div>
                </div>
              ))}
            </div>

            <div style={{...card,padding:"18px 20px",marginBottom:22}}>
              <div style={{fontSize:11,fontWeight:600,color:B.gray,textTransform:"uppercase",letterSpacing:"0.6px",marginBottom:12}}>Add Client Site</div>
              <div style={{display:"flex",gap:10}}>
                <input value={newSite} onChange={e=>setNewSite(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSite()} placeholder="https://clientsite.com"
                  style={{flex:1,background:"#22304a",border:"1px solid #2d3f5a",borderRadius:6,padding:"9px 14px",color:"#fff",fontSize:14,outline:"none"}}/>
                <button onClick={addSite} style={{background:"#e8291c",color:"#fff",border:"none",borderRadius:6,padding:"9px 20px",fontWeight:600,fontSize:13,cursor:"pointer"}}>Add</button>
              </div>
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {sites.length===0&&!dbErr&&(
                <div style={{textAlign:"center",padding:"60px 0",color:B.gray}}>
                  <div style={{fontSize:32,marginBottom:12}}>🔍</div>
                  <div style={{fontWeight:600,marginBottom:8}}>No sites added yet</div>
                  <div style={{fontSize:13}}>Add a client site above to get started</div>
                </div>
              )}
              {sites.map(url=>{
                const s=scans[url];
                const isScanning=scanning[url];
                const score=s?.score;
                const errLog=logs[url]&&logs[url].startsWith("Error");
                return(
                  <div key={url} style={card}>
                    <div style={{display:"flex",alignItems:"center",gap:14,padding:"16px 20px"}}>
                      {score!==undefined&&(
                        <div style={{textAlign:"center",minWidth:48,flexShrink:0}}>
                          <div style={{fontSize:22,fontWeight:800,color:sc(score),lineHeight:1}}>{score}</div>
                          <div style={{fontSize:10,color:B.gray,textTransform:"uppercase",marginTop:2}}>Score</div>
                        </div>
                      )}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:600,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{url}</div>
                        <div style={{fontSize:12,color:errLog?"#e8291c":B.gray,marginTop:3}}>
                          {isScanning?(logs[url]||"Starting..."):s?"Scanned "+new Date(s.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})+(s.live?" (live)":" (demo)"):logs[url]||"Not yet scanned"}
                        </div>
                      </div>
                      {s&&!isScanning&&(
                        <div style={{display:"flex",gap:8,flexShrink:0}}>
                          <span style={{background:"rgba(232,41,28,.15)",color:"#e8291c",borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:600}}>{getCrit(url)} Critical</span>
                          <span style={{background:"rgba(245,158,11,.15)",color:"#f59e0b",borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:600}}>{getMed(url)} Medium</span>
                        </div>
                      )}
                      <div style={{display:"flex",gap:8,flexShrink:0}}>
                        {s&&!isScanning&&(
                          <button onClick={()=>{setActive(url);setView("results");setTab("all");setExpanded(null);}} style={{background:"#22304a",color:"#fff",border:"none",borderRadius:6,padding:"7px 13px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Report</button>
                        )}
                        <button onClick={()=>runScan(url)} disabled={isScanning}
                          style={{background:isScanning?"#22304a":"#e8291c",color:"#fff",border:"none",borderRadius:6,padding:"7px 13px",fontSize:12,fontWeight:600,cursor:isScanning?"default":"pointer",opacity:isScanning?0.6:1,display:"flex",alignItems:"center",gap:6}}>
                          {isScanning?<><Spin/> Scanning...</>:s?"Re-scan":"Scan Now"}
                        </button>
                        <button onClick={()=>removeSite(url)} style={{background:"none",color:B.gray,border:"1px solid #22304a",borderRadius:6,padding:"7px 10px",fontSize:12,cursor:"pointer"}}>✕</button>
                      </div>
                    </div>
                    {s&&!isScanning&&(
                      <div style={{borderTop:"1px solid #22304a",padding:"11px 20px",background:"#0c1520",display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:12,color:B.gray,whiteSpace:"nowrap",flexShrink:0}}>Notion DB:</span>
                        <input value={notionLinks[url]||""} onChange={e=>setNotionLinks(s=>({...s,[url]:e.target.value}))} placeholder="Paste Notion database URL or ID..."
                          style={{flex:1,background:"#22304a",border:"1px solid #2d3f5a",borderRadius:6,padding:"6px 12px",color:"#fff",fontSize:12,outline:"none"}}/>
                        <button onClick={()=>doPush(url)} disabled={pushing[url]}
                          style={{background:pushed[url]?"#22c55e":"#5b3fa0",color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:6,flexShrink:0,opacity:pushing[url]?0.7:1}}>
                          {pushing[url]?<><Spin/> Pushing...</>:pushed[url]?"✓ Sent to Notion":"→ Push to Notion"}
                        </button>
                      </div>
                    )}
                    {pushErr[url]&&<div style={{borderTop:"1px solid rgba(232,41,28,.2)",padding:"8px 20px",background:"rgba(232,41,28,.08)",fontSize:12,color:"#e8291c"}}>Notion error: {pushErr[url]}</div>}
                  </div>
                );
              })}
            </div>

            <div style={{marginTop:24,background:"rgba(232,41,28,.08)",border:"1px solid rgba(232,41,28,.25)",borderRadius:10,padding:"14px 18px",display:"flex",gap:12,alignItems:"center"}}>
              <span style={{fontSize:18}}>📅</span>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:"#e8291c",marginBottom:2}}>Monthly Auto-Scan Scheduled</div>
                <div style={{fontSize:12,color:B.gray}}>All sites scan automatically on the 1st of each month. Results are saved to your database.</div>
              </div>
            </div>
          </div>
        )}

        {view==="results"&&scan&&(
          <div>
            <div style={{marginBottom:22}}>
              <div style={{fontSize:12,color:B.gray,marginBottom:4}}>SEO Report {!scan.live&&<span style={{color:"#f59e0b"}}>(demo data)</span>}</div>
              <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>{active}</div>
              <div style={{fontSize:12,color:B.gray,marginBottom:14}}>Scanned {new Date(scan.date).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}</div>
              {scan.summary&&<div style={{background:"#1a2332",border:"1px solid #22304a",borderRadius:10,padding:"14px 18px",fontSize:14,color:"#a8bbd4",lineHeight:1.7}}>{scan.summary}</div>}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:20}}>
              {[
                {label:"SEO Score",val:scan.score+"/100",color:sc(scan.score)},
                {label:"Critical",val:issues.filter(i=>i.priority==="critical").length,color:"#e8291c"},
                {label:"Medium",val:issues.filter(i=>i.priority==="medium").length,color:"#f59e0b"},
                {label:"Passed",val:(scan.passed||[]).length,color:"#22c55e"},
              ].map(s=>(
                <div key={s.label} style={{background:s.color+"18",border:"1px solid "+s.color+"35",borderRadius:10,padding:"14px 16px"}}>
                  <div style={{color:s.color,fontSize:11,fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>{s.label}</div>
                  <div style={{fontSize:26,fontWeight:800,color:s.color}}>{s.val}</div>
                </div>
              ))}
            </div>

            <div style={{...card,padding:"12px 18px",marginBottom:20,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:12,color:B.gray,whiteSpace:"nowrap",flexShrink:0}}>Notion DB:</span>
              <input value={notionLinks[active]||""} onChange={e=>setNotionLinks(s=>({...s,[active]:e.target.value}))} placeholder="Paste Notion database URL or ID..."
                style={{flex:1,background:"#22304a",border:"1px solid #2d3f5a",borderRadius:6,padding:"7px 12px",color:"#fff",fontSize:13,outline:"none"}}/>
              <button onClick={()=>doPush(active)} disabled={pushing[active]}
                style={{background:pushed[active]?"#22c55e":"#5b3fa0",color:"#fff",border:"none",borderRadius:6,padding:"7px 16px",fontSize:13,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                {pushing[active]?<><Spin/> Pushing...</>:pushed[active]?"✓ Sent":"→ Push to Notion"}
              </button>
            </div>

            <div style={{display:"flex",gap:4,marginBottom:20,background:"#1a2332",borderRadius:8,padding:4,width:"fit-content",border:"1px solid #22304a"}}>
              {[["all","All Issues"],["critical","Critical"],["medium","Medium"]].map(([k,l])=>(
                <button key={k} onClick={()=>{setTab(k);setExpanded(null);}}
                  style={{background:tab===k?"#e8291c":"none",color:tab===k?"#fff":B.gray,border:"none",borderRadius:6,padding:"6px 16px",fontSize:13,fontWeight:600,cursor:"pointer"}}>{l}</button>
              ))}
            </div>

            {tab==="all"&&(scan.passed||[]).length>0&&(
              <div style={{marginBottom:20}}>
                <div style={{fontSize:11,fontWeight:700,color:"#22c55e",textTransform:"uppercase",letterSpacing:"1px",marginBottom:10}}>Passing Checks</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {scan.passed.map(p=><span key={p} style={{background:"rgba(34,197,94,.12)",color:"#22c55e",fontSize:12,padding:"4px 10px",borderRadius:6}}>{p}</span>)}
                </div>
              </div>
            )}

            {cats.map(cat=>(
              <div key={cat} style={{marginBottom:20}}>
                <div style={{fontSize:11,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"1px",marginBottom:10}}>{cat}</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {filtered.filter(i=>i.category===cat).map(issue=>{
                    const open=expanded===issue.id;
                    const accent=issue.priority==="critical"?"#e8291c":"#f59e0b";
                    return(
                      <div key={issue.id} style={{...card,border:"1px solid "+(open?accent:"#22304a")}}>
                        <div onClick={()=>setExpanded(open?null:issue.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 18px",cursor:"pointer"}}>
                          <span style={{background:accent+"22",color:accent,fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:4,textTransform:"uppercase",whiteSpace:"nowrap"}}>{issue.priority}</span>
                          <div style={{flex:1,fontWeight:600,fontSize:14}}>{issue.label}</div>
                          <div style={{color:B.gray,fontSize:13,whiteSpace:"nowrap"}}>{issue.count} instance{issue.count!==1?"s":""}</div>
                          <span style={{color:B.gray,fontSize:11}}>{open?"▲":"▼"}</span>
                        </div>
                        {open&&(
                          <div style={{borderTop:"1px solid #22304a",padding:"14px 18px",background:"#0c1520"}}>
                            {issue.affected&&issue.affected.length>0&&(
                              <div style={{marginBottom:14}}>
                                <div style={{fontSize:11,color:B.gray,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>Affected Pages</div>
                                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                                  {issue.affected.slice(0,8).map((pg,i)=>(
                                    <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,fontSize:13}}>
                                      <span style={{color:accent,fontSize:9,marginTop:4,flexShrink:0}}>●</span>
                                      <span style={{color:"#a8bbd4",wordBreak:"break-all"}}>{pg}</span>
                                    </div>
                                  ))}
                                  {issue.affected.length>8&&<div style={{fontSize:12,color:B.gray}}>+{issue.affected.length-8} more</div>}
                                </div>
                              </div>
                            )}
                            <div style={{borderTop:issue.affected&&issue.affected.length?"1px solid #22304a":"none",paddingTop:issue.affected&&issue.affected.length?12:0}}>
                              <div style={{fontSize:11,color:B.gray,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6}}>Recommended Fix</div>
                              <div style={{fontSize:13,color:"#a8bbd4",lineHeight:1.7}}>{issue.fix}</div>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
