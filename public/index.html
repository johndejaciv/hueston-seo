const POOL=[
  {id:"missing_title",label:"Missing or empty title tag",priority:"critical",category:"On-Page",fix:"Add a unique descriptive title tag (50-60 chars) with the primary keyword near the front."},
  {id:"dup_title",label:"Duplicate title tags",priority:"critical",category:"On-Page",fix:"Each page needs a unique title. Audit CMS templates so dynamic titles are generated per-page."},
  {id:"missing_h1",label:"Missing H1 tag",priority:"critical",category:"On-Page",fix:"Add exactly one H1 per page that clearly describes the topic with the primary keyword."},
  {id:"dup_h1",label:"Multiple H1 tags on same page",priority:"medium",category:"On-Page",fix:"Reduce to a single H1. Move additional headings to H2 or H3."},
  {id:"missing_meta",label:"Missing meta descriptions",priority:"medium",category:"On-Page",fix:"Write unique meta descriptions (150-160 chars) for each page."},
  {id:"broken_links",label:"Broken internal links (4xx)",priority:"critical",category:"Technical",fix:"Redirect all broken URLs to the most relevant live page using 301 redirects."},
  {id:"redirect_chains",label:"Redirect chains (3xx)",priority:"medium",category:"Technical",fix:"Reduce chains to a single 301. Update source links to point to the final URL."},
  {id:"missing_canonical",label:"Missing canonical tags",priority:"medium",category:"Technical",fix:"Add a canonical tag to each page pointing to the preferred URL."},
  {id:"noindex",label:"Important pages blocked by noindex",priority:"critical",category:"Indexability",fix:"Review noindex tags — ensure pages meant to rank do not have this set."},
  {id:"missing_sitemap",label:"Missing XML sitemap",priority:"critical",category:"Technical",fix:"Create an XML sitemap and submit it via Google Search Console."},
  {id:"missing_alt",label:"Images missing alt text",priority:"medium",category:"Accessibility",fix:"Add descriptive alt text to all images."},
  {id:"slow_pages",label:"Slow loading pages (over 3s)",priority:"critical",category:"Performance",fix:"Compress images, enable caching, use a CDN, and minimize render-blocking JS/CSS."},
  {id:"large_images",label:"Oversized images (over 500KB)",priority:"medium",category:"Performance",fix:"Compress images to under 200KB. Use WebP format."},
  {id:"no_schema",label:"Missing structured data / schema",priority:"medium",category:"Structured Data",fix:"Implement JSON-LD schema (Organization, LocalBusiness, FAQ)."},
  {id:"thin_content",label:"Thin content pages (under 300 words)",priority:"medium",category:"Content",fix:"Expand thin pages with helpful content that addresses user intent."},
  {id:"missing_og",label:"Missing Open Graph tags",priority:"medium",category:"On-Page",fix:"Add og:title, og:description, and og:image tags."},
];

const PATHS=["/","/about","/services","/blog","/contact","/pricing","/faq","/team","/work","/resources"];
function rand(seed,n){return Math.abs(Math.sin(seed*9301+n*49297)*233280)%1}

function demoScan(url){
  const seed=url.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  const issues=[];
  POOL.forEach((check,i)=>{
    if(rand(seed,i)>(check.priority==="critical"?0.55:0.45))return;
    const count=Math.max(1,Math.floor(rand(seed+i,i+1)*8));
    const affected=Array.from({length:count},(_,k)=>url.replace(/\/$/,"")+PATHS[k%PATHS.length]);
    issues.push({...check,count,affected});
  });
  const passed=POOL.filter(c=>!issues.find(i=>i.id===c.id)).map(c=>c.label);
  const crit=issues.filter(i=>i.priority==="critical").length;
  const score=Math.max(10,Math.min(95,100-crit*12-(issues.length-crit)*4));
  return{url,score,summary:"Demo data — live scan failed. Check error below.",issues,passed,date:new Date().toISOString(),live:false};
}

function getEndOfMonth(){
  const now=new Date();
  return new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split("T")[0];
}

}

function App(){
  const [sites,setSites]=useState([]);
  const [newSite,setNewSite]=useState("");
  const [scans,setScans]=useState({});
  const [pageSpeed,setPageSpeed]=useState({});
  const [scanning,setScanning]=useState({});
  const [scanningAll,setScanningAll]=useState(false);
  const [logs,setLogs]=useState({});
  const [scanErrors,setScanErrors]=useState({});
  const [pushStatus,setPushStatus]=useState({});
  const [pushing,setPushing]=useState({});
  const [pushed,setPushed]=useState({});
  const [pushErr,setPushErr]=useState({});
  const [view,setView]=useState("dashboard");
  const [active,setActive]=useState(null);
  const [tab,setTab]=useState("all");
  const [expanded,setExpanded]=useState(null);
  const [psTab,setPsTab]=useState("mobile");
  const [histories,setHistories]=useState({});
  const [expandedUrls,setExpandedUrls]=useState({});
  const [maxPages,setMaxPages]=useState(()=>parseInt(ls.get("maxPages")||"50"));
  const [loading,setLoading]=useState(true);
  const [dbErr,setDbErr]=useState(null);

  useEffect(()=>{
    fetch("/api/sites").then(r=>r.json()).then(data=>{
      if(data.error)setDbErr(data.error);
      if(data.sites)setSites(data.sites);
      if(data.scans){
        setScans(data.scans);
        const ps={};
        Object.entries(data.scans).forEach(([url,scan])=>{ if(scan.pageSpeed){ const raw=scan.pageSpeed; ps[url]=raw.scores?{[raw.strategy||"mobile"]:raw}:raw; } });
        setPageSpeed(ps);
      }
      if(data.settings){
        const statuses={};
        Object.entries(data.settings).forEach(([u,s])=>{ if(s.pushStatus)statuses[u]=s.pushStatus; });
        setPushStatus(statuses);
      }
      if(data.histories)setHistories(data.histories);
      const sv=ls.get("hv"), sa=ls.get("ha"), st=ls.get("ht");
      if(sv)setView(sv);
      if(sa)setActive(sa);
      if(st)setTab(st);
    }).catch(e=>setDbErr(e.message)).finally(()=>setLoading(false));
  },[]);

  const log=(url,msg)=>setLogs(s=>({...s,[url]:msg}));

  const goTo=(v,a=null,t="all")=>{
    setView(v);ls.set("hv",v);
    setActive(a);ls.set("ha",a||"");
    setTab(t);ls.set("ht",t);
    setExpanded(null);
  };

  const saveSettings=(url,ps)=>{
    fetch("/api/sites",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"save_settings",url,pushStatus:ps})}).catch(()=>{});
  };

  const addSite=async()=>{
    let v=newSite.trim().replace(/\/$/,"");
    if(!v)return;
    if(!v.startsWith("http"))v="https://"+v;
    if(sites.includes(v)){setNewSite("");return;}
    setNewSite("");
    const res=await fetch("/api/sites",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"add_site",url:v})});
    const data=await res.json();
    if(data.sites)setSites(data.sites);
    if(data.error)setDbErr(data.error);
  };

  const removeSite=async(url)=>{
    setSites(s=>s.filter(u=>u!==url));
    setScans(s=>{const n={...s};delete n[url];return n;});
    if(active===url)goTo("dashboard");
    fetch("/api/sites",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"remove_site",url})}).catch(()=>{});
  };

  const runScan=useCallback(async(url)=>{
    setScanning(s=>({...s,[url]:true}));
    setScanErrors(s=>({...s,[url]:null}));
    log(url,"Crawling site...");
    try{
      const [seoRes,mobileRes,desktopRes]=await Promise.allSettled([
        fetch("/api/crawl",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({url,maxPages}),
        }).then(async r=>{
          const data=await r.json();
          if(!r.ok||data.error)throw new Error(data.error||"HTTP "+r.status);
          return data;
        }),
        fetch("/api/pagespeed?url="+encodeURIComponent(url)+"&strategy=mobile").then(r=>r.json()).catch(()=>null),
        fetch("/api/pagespeed?url="+encodeURIComponent(url)+"&strategy=desktop").then(r=>r.json()).catch(()=>null),
      ]);
      const psMobile=(mobileRes.status==="fulfilled"&&mobileRes.value&&!mobileRes.value.error)?mobileRes.value:null;
      const psDesktop=(desktopRes.status==="fulfilled"&&desktopRes.value&&!desktopRes.value.error)?desktopRes.value:null;
      const psData=(psMobile||psDesktop)?{...(psMobile?{mobile:psMobile}:{}), ...(psDesktop?{desktop:psDesktop}:{})}:null;
      if(seoRes.status==="fulfilled"){
        const result={...seoRes.value,date:new Date().toISOString(),live:true,...(psData?{pageSpeed:psData}:{})};
        // Inject performance action items if PageSpeed score < 50
        const psIssues=[];
        ["mobile","desktop"].forEach(strategy=>{
          const ps=psData?.[strategy];
          if(ps&&ps.scores.performance<50){
            const topOpps=(ps.opportunities||[]).slice(0,5).map(o=>o.label+(o.savings?" ("+o.savings+")":"")).join("; ");
            psIssues.push({
              id:"ps-perf-"+strategy,
              label:"Low PageSpeed Performance — "+strategy+" ("+ps.scores.performance+"/100)",
              priority:"critical",
              category:"Performance",
              count:(ps.opportunities||[]).length||1,
              affected:[url],
              fix:topOpps||"Optimize images, reduce render-blocking JS/CSS, enable caching, use a CDN.",
            });
          }
        });
        if(psIssues.length)result.issues=[...(result.issues||[]),...psIssues];
        setScans(s=>({...s,[url]:result}));
        if(psData)setPageSpeed(s=>({...s,[url]:psData}));
        // Update history state optimistically
        setHistories(s=>{
          const prev=s[url]||[];
          const entry={date:result.date,score:result.score,pagesAudited:result.pagesAudited};
          return {...s,[url]:[entry,...prev].slice(0,6)};
        });
        log(url,"✓ Scan complete"+(result.pagesAudited>1?" ("+result.pagesAudited+" pages)":""));
        fetch("/api/sites",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"save_scan",url,scan:result})})
          .then(r=>r.json()).then(d=>{if(!d.ok)log(url,"⚠ Scan saved but may not persist: "+(d.error||"unknown"));})
          .catch(e=>log(url,"⚠ Failed to save scan: "+e.message));
      } else {
        setScanErrors(s=>({...s,[url]:seoRes.reason.message}));
        log(url,"Scan failed — demo data loaded");
        const demo=demoScan(url);
        setScans(s=>({...s,[url]:demo}));
      }
    }catch(e){
      setScanErrors(s=>({...s,[url]:e.message}));
      log(url,"Error: "+e.message);
    }
    setScanning(s=>({...s,[url]:false}));
  },[]);

  const runAll=useCallback(async()=>{
    setScanningAll(true);
    for(let i=0;i<sites.length;i++){
      await runScan(sites[i]);
      if(i<sites.length-1)await sleep(65000);
    }
    setScanningAll(false);
  },[sites,runScan]);

  const doPush=async(url)=>{
    const scan=scans[url];
    if(!scan)return;
    const due=getEndOfMonth();
    const crit=scan.issues.filter(i=>i.priority==="critical");
    const med=scan.issues.filter(i=>i.priority==="medium");
    const title=new Date().toLocaleDateString("en-US",{month:"long",year:"numeric"})+" SEO Audit — "+url;
    const body=[
      "## Summary",scan.summary||"","",
      "SEO Score: "+scan.score+"/100",
      "Scanned: "+new Date(scan.date).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}),"",
      "## Critical Issues ("+crit.length+")",
      ...crit.map(i=>"- [ ] "+i.label+" — "+i.fix),"",
      "## Medium Issues ("+med.length+")",
      ...med.map(i=>"- [ ] "+i.label+" — "+i.fix),"",
      "## Next Steps",
      "- [ ] Review critical issues and assign to dev/content team",
      "- [ ] Schedule fixes before end of month",
      "- [ ] Re-scan after fixes to verify improvements",
    ].join("\n");

    setPushing(s=>({...s,[url]:true}));
    setPushErr(s=>({...s,[url]:null}));
    setPushed(s=>({...s,[url]:false}));
    try{
      const res=await fetch("/api/notion-push",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({title,due,body,siteUrl:url}),
      });
      const data=await res.json();
      if(!res.ok)throw new Error(data.error||"Push failed");
      const ps={ok:true,date:new Date().toISOString(),error:null};
      setPushed(s=>({...s,[url]:true}));
      setPushStatus(s=>({...s,[url]:ps}));
      saveSettings(url,ps);
    }catch(e){
      const ps={ok:false,date:new Date().toISOString(),error:e.message};
      setPushErr(s=>({...s,[url]:e.message}));
      setPushStatus(s=>({...s,[url]:ps}));
      saveSettings(url,ps);
    }
    setPushing(s=>({...s,[url]:false}));
  };

  const exportCsv=(url,scan)=>{
    const rows=[["URL","Category","Priority","Issue","Count","Affected Pages","Fix"]];
    (scan.issues||[]).forEach(i=>rows.push([url,i.category,i.priority,i.label,i.count,(i.affected||[]).join(" | "),i.fix]));
    const csv=rows.map(r=>r.map(c=>'"'+String(c==null?"":c).replace(/"/g,'""')+'"').join(",")).join("\n");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob(["\ufeff"+csv],{type:"text/csv"}));
    a.download=(new URL(url).hostname)+"-seo-"+new Date().toISOString().slice(0,10)+".csv";
    a.click();
  };

  const scan=active?scans[active]:null;
  const issues=scan?(scan.issues||[]):[];
  const filtered=issues.filter(i=>tab==="all"||i.priority===tab);
  const cats=[...new Set(filtered.map(i=>i.category))];
  const getCrit=u=>(scans[u]?.issues||[]).filter(i=>i.priority==="critical").length;
  const getMed=u=>(scans[u]?.issues||[]).filter(i=>i.priority==="medium").length;
  const totalCrit=sites.reduce((a,u)=>a+getCrit(u),0);
  const totalMed=sites.reduce((a,u)=>a+getMed(u),0);

  if(loading)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16}}>

          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <img src={"data:image/svg+xml;base64,"+LOGO} alt="Hueston" style={{height:28}}/>
            <span style={{color:B.gray,fontSize:13,borderLeft:"1px solid #22304a",paddingLeft:16}}>SEO Monitor</span>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            {view==="results"&&<button onClick={()=>goTo("dashboard")} style={{background:"none",border:"none",color:B.gray,cursor:"pointer",fontSize:13}}>← Dashboard</button>}
            {view==="results"&&scan&&<button onClick={()=>exportCsv(active,scan)} style={{background:"none",border:"1px solid #22304a",color:B.gray,borderRadius:6,padding:"7px 13px",fontSize:12,fontWeight:600,cursor:"pointer"}}>↓ CSV</button>}
            <select value={maxPages} onChange={e=>{const v=parseInt(e.target.value);setMaxPages(v);ls.set("maxPages",String(v));}} style={{background:"#22304a",border:"1px solid #2d3f5a",color:"#a8bbd4",borderRadius:6,padding:"7px 10px",fontSize:12,cursor:"pointer"}}>
              {[50,100,150].map(n=><option key={n} value={n}>{n} pages</option>)}

            <button onClick={runAll} disabled={scanningAll} style={{background:"#e8291c",color:"#fff",border:"none",borderRadius:6,padding:"7px 16px",fontSize:13,fontWeight:600,cursor:"pointer",opacity:scanningAll?0.6:1,display:"flex",alignItems:"center",gap:6}}>
              {scanningAll?<><Spin/> Scanning...</>:"Scan All"}
            </button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:1100,margin:"0 auto",padding:"28px 24px"}}>
        {dbErr&&<div style={{background:"rgba(232,41,28,.1)",border:"1px solid rgba(232,41,28,.3)",borderRadius:10,padding:"12px 18px",marginBottom:20,fontSize:13,color:"#e8291c"}}>⚠ Database error: {dbErr}</div>}

        {view==="dashboard"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:28}}>

                  <div style={{fontSize:32,fontWeight:700,color:s.color}}>{s.val}</div>
                </div>

            </div>

            <div style={{...card,padding:"18px 20px",marginBottom:22}}>

              <div style={{display:"flex",gap:10}}>
                <input value={newSite} onChange={e=>setNewSite(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSite()} placeholder="https://clientsite.com" style={{flex:1,background:"#22304a",border:"1px solid #2d3f5a",borderRadius:6,padding:"9px 14px",color:"#fff",fontSize:14,outline:"none"}}/>
                <button onClick={addSite} style={{background:"#e8291c",color:"#fff",border:"none",borderRadius:6,padding:"9px 20px",fontWeight:600,fontSize:13,cursor:"pointer"}}>Add</button>

            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {sites.length===0&&!dbErr&&(
                <div style={{textAlign:"center",padding:"60px 0",color:B.gray}}>
                  <div style={{fontSize:32,marginBottom:12}}>🔍</div>
                  <div style={{fontWeight:600,marginBottom:8}}>No sites added yet</div>
                  <div style={{fontSize:13}}>Add a client site above to get started</div>
                </div>
              )}
              {sites.map(url=>{
                const s=scans[url];
                const isScanning=scanning[url];
                const score=s?.score;
                const ps=pushStatus[url];
                return(
                  <div key={url} style={card}>

                        <div style={{fontSize:12,color:B.gray,marginTop:3}}>

                      {s&&!isScanning&&(

                      </div>
                    </div>

                    {s&&!isScanning&&(
                      <div style={{borderTop:"1px solid #22304a",background:"#0c1520",padding:"10px 20px",display:"flex",alignItems:"center",gap:12}}>
                        <a href="https://www.notion.so/hueston/28110856346681939b49d58f93578143?v=281108563466812bb2d2000c481e66cc" target="_blank" style={{fontSize:11,color:"#8b8bff",whiteSpace:"nowrap",flexShrink:0,textDecoration:"none"}}>→ Hueston Tasks ↗</a>

                        <button onClick={()=>doPush(url)} disabled={pushing[url]} style={{background:pushed[url]?"#22c55e":"#5b3fa0",color:"#fff",border:"none",borderRadius:6,padding:"5px 14px",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5,flexShrink:0,opacity:pushing[url]?0.7:1}}>
                          {pushing[url]?<><Spin/> Pushing...</>:pushed[url]?"✓ Sent":"→ Push to Notion"}
                        </button>
                        {ps&&<span style={{fontSize:11,color:ps.ok?"#22c55e":"#e8291c",flexShrink:0,cursor:ps.ok?"default":"help"}} title={ps.ok?"":ps.error}>

                        </span>}
                      </div>
                    )}
                    {scanErrors[url]&&<div style={{borderTop:"1px solid rgba(245,158,11,.2)",padding:"10px 20px",background:"rgba(245,158,11,.06)",fontSize:12,color:"#f59e0b"}}><strong>⚠ Live scan failed — showing demo data.</strong> Error: {scanErrors[url]}</div>}
                    {pushErr[url]&&<div style={{borderTop:"1px solid rgba(232,41,28,.2)",padding:"8px 20px",background:"rgba(232,41,28,.08)",fontSize:12,color:"#e8291c"}}>Notion error: {pushErr[url]}</div>}
                  </div>

            <div style={{marginTop:24,background:"rgba(232,41,28,.08)",border:"1px solid rgba(232,41,28,.25)",borderRadius:10,padding:"14px 18px",display:"flex",gap:12,alignItems:"center"}}>
              <span style={{fontSize:18}}>📅</span>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:"#e8291c",marginBottom:2}}>Monthly Auto-Scan Scheduled</div>
                <div style={{fontSize:12,color:B.gray}}>All sites scan on the 1st of each month and push automatically to Hueston Tasks.</div>
              </div>
            </div>
          </div>
        )}

        {view==="results"&&scan&&(
          <div>
            <div style={{marginBottom:22}}>
              <div style={{fontSize:12,color:B.gray,marginBottom:4}}>SEO Report {!scan.live&&<span style={{color:"#f59e0b"}}>(demo data)</span>}</div>
              <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>{active}</div>
              <div style={{fontSize:12,color:B.gray,marginBottom:14}}>Scanned {new Date(scan.date).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}{scan.pagesAudited>1&&<span style={{marginLeft:8,background:"#22304a",borderRadius:4,padding:"1px 8px"}}>{scan.pagesAudited} pages</span>}</div>
              {scan.summary&&<div style={{background:"#1a2332",border:"1px solid #22304a",borderRadius:10,padding:"14px 18px",fontSize:14,color:"#a8bbd4",lineHeight:1.7}}>{scan.summary}</div>}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:20}}>
              {[
                {label:"SEO Score",val:scan.score+"/100",color:scoreCol(scan.score)},
                {label:"Critical",val:issues.filter(i=>i.priority==="critical").length,color:"#e8291c"},
                {label:"Medium",val:issues.filter(i=>i.priority==="medium").length,color:"#f59e0b"},
                {label:"Passed",val:(scan.passed||[]).length,color:"#22c55e"},
              ].map(s=>(
                <div key={s.label} style={{background:s.color+"18",border:"1px solid "+s.color+"35",borderRadius:10,padding:"14px 16px"}}>
                  <div style={{color:s.color,fontSize:11,fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>{s.label}</div>
                  <div style={{fontSize:26,fontWeight:800,color:s.color}}>{s.val}</div>
                </div>
              ))}
            </div>

            {pageSpeed[active]&&(()=>{
              const psData=pageSpeed[active];
              const ps=psData[psTab]||psData.mobile||psData.desktop;
              if(!ps)return null;
              const hasBoth=!!(psData.mobile&&psData.desktop);
              return(
                <div style={{...card,padding:"18px 20px",marginBottom:20}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                    <div style={{fontSize:11,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"1px"}}>Google PageSpeed</div>
                    {hasBoth&&(
                      <div style={{display:"flex",gap:2,background:"#0c1520",borderRadius:6,padding:2}}>
                        {["mobile","desktop"].map(s=>(
                          <button key={s} onClick={()=>setPsTab(s)} style={{background:psTab===s?"#22304a":"none",color:psTab===s?"#fff":B.gray,border:"none",borderRadius:5,padding:"4px 12px",fontSize:11,fontWeight:600,cursor:"pointer",textTransform:"capitalize"}}>{s}</button>
                        ))}
                      </div>
                    )}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:18}}>
                    {[{label:"Performance",val:ps.scores.performance},{label:"SEO",val:ps.scores.seo},{label:"Accessibility",val:ps.scores.accessibility},{label:"Best Practices",val:ps.scores.bestPractices}].map(s=>(
                      <div key={s.label} style={{background:scoreCol(s.val)+"18",border:"1px solid "+scoreCol(s.val)+"35",borderRadius:8,padding:"12px 14px",textAlign:"center"}}>
                        <div style={{fontSize:24,fontWeight:800,color:scoreCol(s.val)}}>{s.val}</div>
                        <div style={{fontSize:11,color:scoreCol(s.val),marginTop:4}}>{s.label}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:ps.opportunities&&ps.opportunities.length?16:0}}>
                    {[{label:"First Contentful Paint",...ps.metrics.fcp},{label:"Largest Contentful Paint",...ps.metrics.lcp},{label:"Total Blocking Time",...ps.metrics.tbt},{label:"Cumulative Layout Shift",...ps.metrics.cls},{label:"Speed Index",...ps.metrics.si},{label:"Time to First Byte",...ps.metrics.ttfb}].map(m=>(
                      <div key={m.label} style={{background:"#0c1520",borderRadius:8,padding:"10px 14px"}}>
                        <div style={{fontSize:11,color:B.gray,marginBottom:4}}>{m.label}</div>
                        <div style={{fontSize:16,fontWeight:700,color:metricCol(m.score)}}>{m.value}</div>

                            <span style={{flex:1,color:"#a8bbd4"}}>{o.label}</span>

                    </div>

            <div style={{...card,padding:"12px 18px",marginBottom:12,display:"flex",alignItems:"center",gap:12}}>

              </button>
              {pushStatus[active]&&<span style={{fontSize:11,color:pushStatus[active].ok?"#22c55e":"#e8291c"}}>{pushStatus[active].ok?"✓ Last pushed "+new Date(pushStatus[active].date).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"✗ Last push failed"}</span>}

            </div>

            {(histories[active]||[]).length>1&&(()=>{
              const hist=histories[active];
              return(
                <div style={{...card,padding:"18px 20px",marginBottom:20}}>
                  <div style={{fontSize:11,fontWeight:700,color:B.gray,textTransform:"uppercase",letterSpacing:"1px",marginBottom:14}}>Score History</div>

                                <div style={{marginBottom:14}}>
                                  <div style={{fontSize:11,color:B.gray,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>Affected Pages ({issue.affected.length})</div>
                                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                                    {toShow.map((pg,i)=>(
                                      <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,fontSize:13}}>
                                        <span style={{color:accent,fontSize:9,marginTop:4,flexShrink:0}}>●</span>
                                        <span style={{color:"#a8bbd4",wordBreak:"break-all"}}>{pg}</span>
                                      </div>
                                    ))}
                                    {issue.affected.length>5&&(
                                      <button onClick={e=>{e.stopPropagation();setExpandedUrls(s=>({...s,[issue.id]:!s[issue.id]}));}} style={{background:"none",border:"none",color:B.gray,fontSize:12,cursor:"pointer",textAlign:"left",padding:"2px 0",marginTop:2}}>
                                        {allShown?"▲ Show less":"▼ Show all "+issue.affected.length+" pages"}
                                      </button>
                                    )}
                                  </div>
                                </div>
                              );
                            })()}
                            <div style={{borderTop:issue.affected&&issue.affected.length?"1px solid #22304a":"none",paddingTop:issue.affected&&issue.affected.length?12:0}}>
                              <div style={{fontSize:11,color:B.gray,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6}}>Recommended Fix</div>
                              <div style={{fontSize:13,color:"#a8bbd4",lineHeight:1.7}}>{issue.fix}</div>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
